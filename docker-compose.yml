version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "3000:3000"

    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_STUN_SERVER=stun:stun.l.google.com:19302

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s